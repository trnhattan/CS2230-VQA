model:
  name: "Qwen/Qwen2-VL-2B-Instruct"
  type: "qwen2vl"
  min_pixels: 256   # 256 * 28 * 28 ≈ 200K pixels
  max_pixels: 512   # 512 * 28 * 28 ≈ 400K pixels → ~512 patches tối đa

data:
  train_file: "data/ViTextVQA_train.json"
  dev_file: "data/ViTextVQA_dev.json"
  test_file: "data/ViTextVQA_test_gt .json"
  image_dir: "data/st_images"

training:
  output_dir: "checkpoints/qwen2vl_2b"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16   # effective batch = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_length: 512
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_anls"
  greater_is_better: true
  dataloader_num_workers: 2
  report_to: "none"
  seed: 42

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

evaluation:
  checkpoint: null   # null = base model zero-shot; hoặc "checkpoints/qwen2vl_2b/best_model"
  batch_size: 4
  max_new_tokens: 64
  num_beams: 1
  results_file: "results/qwen2vl_2b_test.json"
