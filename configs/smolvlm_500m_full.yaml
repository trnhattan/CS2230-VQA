model:
  name: "HuggingFaceTB/SmolVLM-500M-Instruct"
  type: "smolvlm"

data:
  train_file: "data/ViTextVQA_train.json"
  dev_file: "data/ViTextVQA_dev.json"
  test_file: "data/ViTextVQA_test_gt .json"
  image_dir: "data/st_images"

training:
  output_dir: "checkpoints/smolvlm_500m_full"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8    # effective batch = 16
  learning_rate: 5.0e-5             # nhỏ hơn so với LoRA để tránh catastrophic forgetting
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_length: 1024
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_anls"
  greater_is_better: true
  dataloader_num_workers: 2
  report_to: "none"
  seed: 42

# Không có section lora và quantization → full fine-tune

evaluation:
  checkpoint: null
  batch_size: 8
  max_new_tokens: 64
  num_beams: 1
  results_file: "results/smolvlm_500m_full_test.json"
